name: Container images

on:
  pull_request:
    paths:
      - ".github/workflows/container-images.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "deploy/**"
      - "apps/**"
      - "packages/**"
      - "messages/**"
      - "project.inlang/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig.json"
      - "turbo.json"
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/container-images.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "deploy/**"
      - "apps/**"
      - "packages/**"
      - "messages/**"
      - "project.inlang/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig.json"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - web
          - api
          - collab
          - worker

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve image
        id: config
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repository}-${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.config.outputs.image }}
          labels: |
            org.opencontainers.image.title=ShareBrain ${{ matrix.service }}
            org.opencontainers.image.description=ShareBrain ${{ matrix.service }} service
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: mode=max
          sbom: true

      - name: Attest published image
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.config.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
